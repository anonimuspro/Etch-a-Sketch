<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Etch a Sketch</title>
</head>
<body>

    <h1>Etch a Sketch</h1>
    <div id="container"></div>

    <script>
        const body = document.querySelector("body");
        const container = document.querySelector("#container");

        const resizeBtn = document.createElement("button");
        resizeBtn.textContent = "Resize Grid";
        body.insertBefore(resizeBtn, container);

        let randomizeColors = false;
        const defaultColorBtn = document.createElement("button");
        defaultColorBtn.textContent = "Default Color";
        body.insertBefore(defaultColorBtn, container);
        defaultColorBtn.addEventListener("click", () => {
            randomizeColors = false;
        });

        const randomColorBtn = document.createElement("button");
        randomColorBtn.textContent = "Random Colors";
        body.insertBefore(randomColorBtn, container);
        randomColorBtn.addEventListener("click", () => {
            randomizeColors = true;
        });

        /* Default settings */
        for(let i = 0; i < 256; i++){
            const div = document.createElement("div");
            div.style.width = "50.5px";
            div.style.height = "50.5px";
            container.appendChild(div);

            div.addEventListener("mouseenter", () => {
                if(randomizeColors === true){
                    let red = Math.floor(Math.random() * 255 + 1);
                    let green = Math.floor(Math.random() * 255 + 1);
                    let blue = Math.floor(Math.random() * 255 + 1);
                    div.style.backgroundColor = `rgb(${red}, ${green}, ${blue})`;
                }else{
                    div.style.backgroundColor = "black";
                }
            });
            

            resizeBtn.addEventListener("click", () => {
                container.removeChild(div);
            });
        }

        resizeBtn.addEventListener("click", () => {
            let numOfSquares = Number(window.prompt("Enter the number of squares per side (maximum 100)"));
            if(numOfSquares < 100 && numOfSquares > 0){
                let gridSize = numOfSquares * numOfSquares;
                let squareSize = `${840 / numOfSquares - 2}px`;
        
                for(let i = 0; i < gridSize; i++){
                    const div = document.createElement("div");
                    div.style.width = squareSize;
                    div.style.height = squareSize;
                    container.appendChild(div);


                    div.addEventListener("mouseenter", () => {
                        if(randomizeColors === true){
                            let red = Math.floor(Math.random() * 255 + 1);
                            let green = Math.floor(Math.random() * 255 + 1);
                            let blue = Math.floor(Math.random() * 255 + 1);
                            div.style.backgroundColor = `rgb(${red}, ${green}, ${blue})`;
                        }else{
                            div.style.backgroundColor = "black";
                        }
                    });

                    resizeBtn.addEventListener("click", () => {
                        container.removeChild(div);
                    });
                }
            }
        });

    </script>
</body>
</html>
